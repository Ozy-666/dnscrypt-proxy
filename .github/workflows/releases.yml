on:
  push:
    paths:
      - "**.go"
      - "go.*"
      - ".ci/**"
      - ".github/workflows/releases.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.*"
      - ".ci/**"
      - ".github/workflows/releases.yml"

name: CI

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1
          check-latest: true

      - name: Test suite
        run: |
          go version
          cd .ci && ./ci-test.sh

      - name: Build linux/amd64 (GOAMD64=v3)
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo dev)
          cd dnscrypt-proxy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 GOAMD64=v3 \
            go build -mod vendor -ldflags="-s -w -X main.version=$VERSION" -trimpath .
